{% extends 'base.html' %} {% block main %}
<h1 class="page-header">Uploaded Images</h1>

{% include 'flash_messages.html' %}

<div class="image-grid">
    {% for image in images %}
    <div class="image-item">
        <img
            src="{{ url_for('get_image', filename=image) }}"
            alt="{{ image }}"
        />
    </div>
    {% else %}
    <p>No images uploaded yet.</p>
    {% endfor %}
</div>

<style>
    .image-grid {
        display: grid;
        grid-template-columns: repeat(1fr);
        gap: 20px;
        padding: 20px;
        max-width: 1000px;
        margin: 0 auto;
    }

    .image-item {
        aspect-ratio: 1 / 1;
    }
</style>
{% endblock %}
